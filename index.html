<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kozzy Finance App</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>

body{
    transition:all .3s ease;
}

/* FULL PAGE DARK MODE */
body.dark{
    background-color:#0f172a;
    color:white;
}

/* CARDS */
body.dark .card{
    background-color:#1e293b !important;
    color:white;
}

/* INPUTS */
body.dark input,
body.dark select{
    background-color:#334155;
    color:white;
    border-color:#475569;
}

/* PLACEHOLDER */
body.dark input::placeholder{
    color:#cbd5e1;
}

/* HEADER */
body.dark header{
    background-color: midnightblue !important;
}

/* SEARCH BAR */
body.dark #search{
    background-color:#334155;
}

/* TRANSACTION ITEMS */
body.dark .transaction-item{
    background-color:#1e293b;
    color:white;
}

</style>
</head>

<body class="bg-slate-100">

<!-- LOGIN / REGISTER -->

<div id="authPage" class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md p-6 bg-white shadow-lg card rounded-xl">

<h1 class="mb-4 text-2xl font-bold text-center">
💰 Finance App
</h1>


<input
id="email"
type="email"
placeholder="Email"
class="w-full p-3 mb-3 border rounded"
/>

<input
id="password"
type="password"
placeholder="Password"
class="w-full p-3 mb-3 border rounded"
/>

<div class="grid grid-cols-2 gap-2">
<button
onclick="register()"
class="py-3 text-white bg-green-600 rounded"
>
Register
</button>

<button
onclick="login()"
class="py-3 text-white bg-indigo-600 rounded"

>

Login </button>

</div>

<p id="authMsg" class="mt-3 text-center text-red-500"></p>

</div>

</div>

<!-- APP -->

<div id="appPage" class="hidden">

<header class="flex items-center justify-between p-4 text-white bg-indigo-600">

<h1 class="text-xl font-bold">
💰 Finance Dashboard
</h1>

<div class="flex gap-2">

<button
id="themeBtn"
onclick="toggleDarkMode()"
class="px-4 py-2 text-black bg-white rounded-full shadow"
>
🌙
</button>

<button
onclick="logout()"
class="px-3 py-1 bg-red-500 rounded"

>

Logout </button>

</div>

</header>

<div class="max-w-6xl p-4 mx-auto">

<!-- SUMMARY -->

<div class="grid gap-4 mb-5 md:grid-cols-3">

<div class="p-4 bg-white shadow card rounded-xl">
<p>Income</p>
<h2 id="income" class="text-2xl font-bold text-green-600">₦0</h2>
</div>

<div class="p-4 bg-white shadow card rounded-xl">
<p>Expense</p>
<h2 id="expense" class="text-2xl font-bold text-red-600">₦0</h2>
</div>

<div class="p-4 bg-white shadow card rounded-xl">
<p>Balance</p>
<h2 id="balance" class="text-2xl font-bold text-blue-600">₦0</h2>
</div>

</div>

<!-- ADD -->

<div class="p-4 mb-5 bg-white shadow card rounded-xl">

<h2 class="mb-3 font-bold">
Add Transaction
</h2>

<input
id="desc"
type="text"
placeholder="Description"
class="w-full p-3 mb-3 border rounded"
/>

<input
id="amount"
type="number"
placeholder="Amount"
class="w-full p-3 mb-3 border rounded"
/>

<select id="type" class="w-full p-3 mb-3 border rounded">
<option value="">Select Type</option>
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<select id="category" class="w-full p-3 mb-3 border rounded">
<option>Food</option>
<option>Transport</option>
<option>Rent</option>
<option>Salary</option>
<option>Shopping</option>
<option>Entertainment</option>
<option>Other</option>
</select>

<button
onclick="addTransaction()"
class="w-full py-3 text-white bg-indigo-600 rounded"

>

Add Transaction </button>

</div>

<!-- SEARCH -->

<div class="mb-4">

<input
id="search"
onkeyup="renderTransactions()"
placeholder="Search transaction..."
class="w-full p-3 border rounded"
/>

</div>

<!-- ACTIONS -->

<div class="flex flex-wrap gap-2 mb-4">

<button
onclick="exportCSV()"
class="px-4 py-2 text-white bg-green-600 rounded"

>

Export CSV </button>

<button
onclick="clearTransactions()"
class="px-4 py-2 text-white bg-red-600 rounded"

>

Clear All </button>

</div>

<!-- LIST -->

<div
id="transactionList"
class="space-y-3"
></div>

</div>

</div>

<script src="server.js"></script>

</body>
</html>
